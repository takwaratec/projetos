site_name: Plataforma Amazônia Regenerativa
site_description: Polo integrado de bioindústrias comunitárias de baixo carbono na Amazônia Legal
site_author: Fabio Resck Takwara
site_url: https://takwaratec.github.io/projetos

repo_name: takwaratec/projetos
repo_url: https://github.com/takwaratec/projetos
edit_uri: edit/main/docs/

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

theme:
  name: material
  language: pt
  palette:
    primary: green
    accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - Início: index.md
  - 📂 Dossiê BNDES (Auditado):
      - 01. Formulário Consolidado: 09_DOSSIE_BNDES/01_FORMULARIO_01_CONSOLIDADO.md
      - 02. Orçamento Consolidado: 09_DOSSIE_BNDES/02_FORMULARIO_ORCAMENTO_CONSOLIDADO.md
      - 03. Mapa de Migração (C02): 09_DOSSIE_BNDES/03_MAPA_MIGRACAO_BNDES_C02.md
      - 04. Relatório de Auditoria 5.1: 09_DOSSIE_BNDES/06_RELATORIO_AUDITORIA_5.1.md
      - 05. Resumo Técnico-Financeiro: 09_DOSSIE_BNDES/05_RESUMO_CONSOLIDACAO_ORCAMENTARIA.md
  - 1. Estratégia e Soberania:
      - Plataforma Amazônia Regenerativa v5.1: 
          - Português (Master): 06_ANAIS_MEMORIA/TAK_plataforma-v5.1.md
          - English: 06_ANAIS_MEMORIA/TAK_plataforma-v5.1_en.md
          - Español: 06_ANAIS_MEMORIA/TAK_plataforma-v5.1_es.md
      - Dossiê Estratégico COP30: 05_ADVOCACY_COP30/COM_dossie-cop30.md
      - Protocolo 5.1 (Governança): 00_GOVERNANCA/GOV_PROTOCOLO_5.1.md
      - Autoria e Propriedade Intelectual: 00_GOVERNANCA/GOV_AUTORIA.md
  - 2. Tecnologia e Soberania (R&D):
      - Memorial Único de Equipamentos: 
          - PT: 08_PROJETOS_ENGENHARIA/TAK_memorial-unico-patentes.md
      - Biorrefinaria Comunitária: 02_PESQUISA_DESENVOLVIMENTO/TAK_memorial-tecnico-biorrefinaria_pt.md
      - Memorial do Reator (T02): 08_PROJETOS_ENGENHARIA/T02_BIORREFINARIA/TAK_memorial-patente-reator.md
      - Tamboreador (T01): 08_PROJETOS_ENGENHARIA/TAMBOREADOR/TAK_memorial-patente-tamboreador.md
      - Resinador Rotativo (T03): 08_PROJETOS_ENGENHARIA/T03_RESINADOR_ROTATIVO/TAK_memorial-patente-resinador-industrial.md
  - 3. Impacto e Manejo:
      - Saneamento Ecológico: 02_PESQUISA_DESENVOLVIMENTO/TAK_nota-tecnica-saneamento-ecologico.md
      - Tratamento Sem Veneno: 02_PESQUISA_DESENVOLVIMENTO/TAK_tratamento-sem-veneno.md
      - Crêdito de Carbono: 01_TECNOLOGIA_TAKWARA/TAK_manual-fitorremediacao-credito-carbono.md
  - 4. Equipe:
      - Fabio Resck Takwara: 06_ANAIS_MEMORIA/perfis-equipe/OPS_perfil-fabio-takwara.md
      - Tânia Cristina Cruz: 06_ANAIS_MEMORIA/perfis-equipe/OPS_perfil-taina-cruz.md
  - 5. Blog:
      - 'Artigos Selecionados': 07_BLOG_MEDIUM/

not_in_nav:
  - 99_RESTRITO/**
  - Arquivo Takwara/**
  - history-version/**
  - "**/historico/**"
  - 01_GOVERNANCA/**
  - 04_GESTAO_OPERACIONAL/**
  - 09_DOSSIE_BNDES/04_ORCAMENTO_DETALHADO_MASTER.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/takwaratec/projetos
    - icon: fontawesome/solid/envelope
      link: mailto:fabiotakwara@gmail.com

copyright: CC BY 4.0 — Fabio Resck Takwara — Plataforma Amazônia Regenerativa

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format

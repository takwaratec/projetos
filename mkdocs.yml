site_name: Plataforma Amazônia Regenerativa
site_description: Polo integrado de bioindústrias comunitárias de baixo carbono na Amazônia Legal
site_author: Fabio Resck Takwara
site_url: https://takwaratec.github.io/projetos

repo_name: takwaratec/projetos
repo_url: https://github.com/takwaratec/projetos
edit_uri: edit/main/docs/

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

theme:
  name: material
  language: pt
  palette:
    primary: green
    accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

